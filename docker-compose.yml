services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - bagelhacks_network

  adminer:
    container_name: adminer
    image: adminer:latest
    ports:
      - "850:8080"
    restart: unless-stopped
    volumes:
      - ./backend/data:/data
    networks:
      - bagelhacks_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development-stage
    command: sh -c "npm install && npm run dev"
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - bagelhacks_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development-stage
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      # Use relative URL - all requests go through nginx proxy
      VITE_API_URL: /api/
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - bagelhacks_network

networks:
  bagelhacks_network:
    driver: bridge

volumes:
  backend_node_modules:
  frontend_node_modules:
