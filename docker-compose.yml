services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - bagelhacks_network

  adminer:
    container_name: adminer
    image: adminer:latest
    ports:
      - "850:8080"
    restart: unless-stopped
    volumes:
      - ./backend/data:/data
    networks:
      - bagelhacks_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development-stage
    command: sh -c "npm install && npm run dev"
    ports:
      - "4200:4200"
    environment:
      PORT: 4200
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    networks:
      - bagelhacks_network

  # n8n:
  #   image: n8nio/n8n:latest
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     TZ: America/Toronto
  #     GENERIC_TIMEZONE: America/Toronto
  #     N8N_SECURE_COOKIE: false
  #     N8N_HOST: localhost
  #     N8N_PORT: 5678
  #     N8N_PROTOCOL: http
  #     WEBHOOK_URL: http://localhost:5678/
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #   depends_on:
  #     - api
  #   volumes:
  #     - n8n_data:/home/node/.n8n
  #     - ./backend/n8n:/files
  #   networks:
  #     - bagelhacks_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development-stage
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 6384"
    ports:
      - "6384:6384"
    environment:
      # Use relative URL - all requests go through nginx proxy
      VITE_API_URL: /api/
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - bagelhacks_network

networks:
  bagelhacks_network:
    driver: bridge

volumes:
  backend_node_modules:
  frontend_node_modules:
  n8n_data:
